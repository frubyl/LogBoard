version: '3.8'

services:
  db:
    image: postgres:15
    container_name: logboard-db
    environment:
      POSTGRES_DB: logboard
      POSTGRES_USER: logboard
      POSTGRES_PASSWORD: logboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logboard"]
      interval: 30s
      timeout: 10s
      retries: 3

  app:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: logboard-app
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://db:5432/logboard
      DATABASE_USERNAME: logboard
      DATABASE_PASSWORD: logboard
      JWT_SECRET: mySecretKeyForLogBoardApplicationWhichIsVeryLongAndSecure
      JWT_ACCESS_TOKEN_EXPIRATION: 3600000
      JWT_REFRESH_TOKEN_EXPIRATION: 86400000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:

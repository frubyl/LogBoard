version: '3.8'

services:
  db:
    image: postgres:15
    container_name: logboard-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-logboard}
      POSTGRES_USER: ${POSTGRES_USER:-logboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-logboard}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logboard"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: logboard-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: logboard-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: logboard-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  app:
    image: ghcr.io/frubyl/logboard-core:latest
    container_name: logboard-app
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-logboard}
      DATABASE_USERNAME: ${POSTGRES_USER:-logboard}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-logboard}
      JWT_SECRET: ${JWT_SECRET:-mySecretKeyForLogBoardApplicationWhichIsVeryLongAndSecure}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION:-3600000}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-86400000}
      API_KEY_HMAC_SECRET: ${API_KEY_HMAC_SECRET:-myDefaultHmacSecretForApiKeyHashingLogBoard}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  log-service:
    image: ghcr.io/frubyl/logboard-log-service:latest
    container_name: logboard-log
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      DATABASE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-logboard}
      DATABASE_USERNAME: ${POSTGRES_USER:-logboard}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-logboard}
      ELASTICSEARCH_URIS: http://elasticsearch:9200
      ELASTICSEARCH_USERNAME: ${ELASTICSEARCH_USERNAME:-}
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-mySecretKeyForLogBoardApplicationWhichIsVeryLongAndSecure}
      API_KEY_HMAC_SECRET: ${API_KEY_HMAC_SECRET:-myDefaultHmacSecretForApiKeyHashingLogBoard}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: logboard-swagger
    ports:
      - "8090:8080"
    volumes:
      - ./docs/openapi.yaml:/openapi.yaml
    environment:
      SWAGGER_JSON: /openapi.yaml
    restart: unless-stopped

volumes:
  postgres_data:
  elasticsearch_data:
  zookeeper_data:
  kafka_data:

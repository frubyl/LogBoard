name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Установка JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Настройка Gradle
        uses: gradle/gradle-build-action@v2

      - name: Сборка Core сервиса
        run: cd core && ./gradlew build -x test

      - name: Сохранение артефактов сборки Core
        uses: actions/upload-artifact@v4
        with:
          name: core-build
          path: core/build/
          retention-days: 1

  test-unit-core:
    needs: build-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Установка JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Настройка Gradle
        uses: gradle/gradle-build-action@v2

      - name: Загрузка артефактов сборки Core
        uses: actions/download-artifact@v4
        with:
          name: core-build
          path: core/build/

      - name: Запуск Unit тестов Core
        run: cd core && ./gradlew test

      - name: Генерация отчета покрытия кода
        run: cd core && ./gradlew jacocoTestReport

      - name: Загрузка отчета о покрытии кода в Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./core/build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests
          name: codecov-core

  test-integration-core:
    needs: test-unit-core
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: logboard_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v3

      - name: Установка JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Настройка Gradle
        uses: gradle/gradle-build-action@v2

      - name: Загрузка артефактов сборки Core
        uses: actions/download-artifact@v4
        with:
          name: core-build
          path: core/build/

      - name: Запуск Интеграционных тестов Core
        run: cd core && ./gradlew integrationTest

  deploy:
    needs: [ test-integration-core ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Деплой на сервер
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/LogBoard
            git pull origin main
            docker-compose build
            docker-compose up -d
            docker image prune -f

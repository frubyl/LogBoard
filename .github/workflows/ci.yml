name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Установка JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Настройка Gradle
        uses: gradle/gradle-build-action@v2

      - name: Сборка Core сервиса
        run: |
          cd core
          ./gradlew build -x test

      - name: Запуск Unit тестов
        run: |
          cd core
          ./gradlew test

      - name: Запуск Интеграционных тестов
        run: |
          cd core
          ./gradlew integrationTest

      - name: Генерация отчета покрытия кода
        run: |
          cd core
          ./gradlew jacocoTestReport

      - name: Загрузка отчета о покрытии кода в Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./core/build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests
          name: codecov-core
server:
  port: ${SERVER_PORT:8081}

spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/logboard}
    username: ${DATABASE_USERNAME:logboard}
    password: ${DATABASE_PASSWORD:logboard}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    enabled: true
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/logboard}
    user: ${DATABASE_USERNAME:logboard}
    password: ${DATABASE_PASSWORD:logboard}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: log-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
    listener:
      ack-mode: RECORD

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}

clickhouse:
  url: ${CLICKHOUSE_URL:jdbc:clickhouse://localhost:8123/default}
  username: ${CLICKHOUSE_USERNAME:default}
  password: ${CLICKHOUSE_PASSWORD:}

jwt:
  secret: ${JWT_SECRET:mySecretKeyForLogBoardApplicationWhichIsVeryLongAndSecure123456789012345}

api-key:
  hmac-secret: ${API_KEY_HMAC_SECRET:default-hmac-secret-for-development-only}

core:
  service:
    url: ${CORE_SERVICE_URL:http://localhost:8080}

logging:
  level:
    com.github.logboard: DEBUG

openapi: 3.0.0
info:
  title: LogBoard API
  description: |
    Платформа для сбора и анализа логов.

    ## Сервисы
    - **Core API** (http://localhost:8080) — управление пользователями, проектами, API ключами

    ## Аутентификация

    ### Для пользователей (JWT)
    Пользователи получают токены через `/login` и передают их через cookie:
    - Cookie: `access_token` (HTTP-only)

    ### Для сервисов (API Key)
    Сервисы используют API ключи, которые создаются в настройках проекта:
    - Header: `X-API-Key: <key>`

    API ключи привязаны к конкретному проекту и имеют срок действия.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Authentication
    description: Эндпоинты для аутентификации пользователей.
  - name: Projects
    description: Эндпоинты для управления проектами.
  - name: API Keys
    description: Управление API ключами для сервисов.
  - name: Logs
    description: Поиск и чтение логов.
  - name: Log Ingestion
    description: Загрузка логов в систему.

security:
  - cookieAuth: []
  - apiKeyAuth: []

paths:
  /register:
    post:
      summary: Регистрация пользователя
      description: Регистрирует нового пользователя с username и паролем.
      operationId: registerUser
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCredentials'
      responses:
        '201':
          description: Пользователь успешно зарегистрирован.
        '400':
          description: Возвращает первую обнаруженную ошибку валидации данных.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Пользователь с таким username уже существует.

        '500':
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /login:
    post:
      summary: Вход пользователя
      description: Аутентифицирует пользователя и выдает токены через HTTP-only cookies.
      operationId: loginUser
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCredentials'
      responses:
        '200':
          description: Успешный вход. Токены устанавливаются через Set-Cookie заголовки.
          headers:
            Set-Cookie:
              schema:
                type: string
              example: access_token=eyJ...; HttpOnly; SameSite=Strict; Path=/; Max-Age=900
            X-Set-Cookie:
              schema:
                type: string
              description: Refresh token устанавливается через X-Set-Cookie заголовок.
              example: refresh_token=eyJ...; HttpOnly; SameSite=Strict; Path=/; Max-Age=604800
        '400':
          description: Возвращает первую обнаруженную ошибку валидации данных.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Неверный логин или пароль.
        '500':
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /refresh:
    post:
      summary: Обновление access token
      description: Использует refresh token из cookie для получения нового access token. Браузер автоматически отправляет cookie.
      operationId: refreshToken
      tags:
        - Authentication
      security: []
      responses:
        '200':
          description: Новый access token успешно получен и установлен через Set-Cookie.
          headers:
            Set-Cookie:
              schema:
                type: string
              example: access_token=eyJ...; HttpOnly; Secure; SameSite=Strict; Path=/; Max-Age=900
        '401':
          description: Refresh token истек или отсутствует.
        '500':
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /logout:
    post:
      summary: Выход пользователя
      description: Очищает HTTP-only cookies с токенами.
      operationId: logoutUser
      tags:
        - Authentication
      security: []
      responses:
        '200':
          description: Пользователь успешно вышел. Cookies очищены.
          headers:
            Set-Cookie:
              schema:
                type: string
              example: access_token=; HttpOnly; SameSite=Strict; Path=/; Max-Age=0
            X-Set-Cookie:
              schema:
                type: string
              example: refresh_token=; HttpOnly; SameSite=Strict; Path=/; Max-Age=0
        '500':
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /projects:
    post:
      summary: Создание нового проекта
      description: Создает новый проект с указанным названием. Пользователь, создающий проект, автоматически получает роль OWNER.
      operationId: createProject
      tags:
        - Projects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
      responses:
        '201':
          description: Проект успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectCreateResponse'
        '400':
          description: Ошибка валидации данных
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Пользователь не авторизован
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: Получение списка проектов пользователя
      description: Возвращает список всех проектов, в которых участвует текущий пользователь.
      operationId: getUserProjects
      tags:
        - Projects
      responses:
        '200':
          description: Список проектов успешно получен
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GetProjectsResponse'
        '401':
          description: Пользователь не авторизован
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /projects/{projectId}:
    delete:
      summary: Удаление проекта
      description: Удаляет проект и все связанные с ним данные. Только владелец проекта может выполнить удаление.
      operationId: deleteProject
      tags:
        - Projects
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID проекта
      responses:
        '200':
          description: Проект успешно удален
        '401':
          description: Пользователь не авторизован
        '403':
          description: Недостаточно прав для выполнения операции
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Проект не найден
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /logs/search:
    post:
      summary: Поиск логов проекта
      description: Возвращает логи проекта с фильтрацией по уровню, тексту сообщения и временному периоду. Доступно всем участникам проекта.
      operationId: searchProjectLogs
      tags:
        - Logs
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogSearchRequest'
      responses:
        '200':
          description: Логи успешно получены.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogSearchResponse'
        '400':
          description: Ошибка валидации данных.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Пользователь не авторизован.
        '403':
          description: Пользователь не является участником проекта.
        '404':
          description: Проект не найден.
        '500':
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /logs/timeline:
    post:
      summary: Таймлайн логов проекта
      description: Возвращает агрегированные счётчики логов по временной шкале на основе тех же фильтров, что и поиск. Обрабатывает всю выборку без пагинации. Доступно всем участникам проекта.
      operationId: getProjectLogsTimeline
      tags:
        - Logs
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogTimelineRequest'
      responses:
        '200':
          description: Таймлайн успешно получен.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TimelineItem'
        '400':
          description: Ошибка валидации данных.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Пользователь не авторизован.
        '403':
          description: Пользователь не является участником проекта.
        '404':
          description: Проект не найден.
        '500':
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /logs/ingest:
    post:
      summary: Загрузка логов
      description: |
        Пакетная загрузка логов в систему.
      operationId: ingestLogs
      tags:
        - Log Ingestion
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogIngestRequest'
      responses:
        '200':
          description: Логи приняты на обработку (асинхронная запись)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogIngestResponse'
        '400':
          description: Ошибка валидации данных.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: API ключ невалиден.
        '404':
          description: Проект не найден.
        '500':
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: Получить статус загрузки по ID
      description: |
        Возвращает текущий статус обработки пакета логов.
      operationId: getIngestionStatus
      tags:
        - Log Ingestion
      security:
        - apiKeyAuth: []
      parameters:
        - name: ingestionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID пакета логов
      responses:
        '200':
          description: Статус загрузки
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionStatusResponse'
        '401':
          description: Неверный API-ключ.
        '404':
          description: Пакет с таким ingestionId не найден.
        '500':
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api-keys:
    post:
      summary: Создать API ключ
      description: |
        Создаёт новый API ключ для доступа к проекту.

        **Важно:** Значение ключа показывается только один раз при создании. Сохраните его в безопасном месте.
      operationId: createApiKey
      tags:
        - API Keys
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyCreateRequest'
      responses:
        '201':
          description: API ключ успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreateResponse'
        '400':
          description: Ошибка валидации данных.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Пользователь не авторизован.
        '403':
          description: Недостаточно прав для создания ключа в этом проекте.
        '404':
          description: Проект не найден.
        '500':
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: Список API ключей проекта
      description: Возвращает список всех API ключей проекта (без значения ключа).
      operationId: listApiKeys
      tags:
        - API Keys
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: projectId
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: ID проекта
      responses:
        '200':
          description: Список API ключей
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiKeyResponse'
        '400':
          description: Ошибка валидации projectId.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Пользователь не авторизован.
        '403':
          description: Недостаточно прав для просмотра ключей проекта.
        '404':
          description: Проект не найден.
        '500':
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api-keys/{keyId}:
    delete:
      summary: Отозвать API ключ
      description: Безвозвратно удаляет API ключ. Сервисы с этим ключом больше не смогут отправлять логи.
      operationId: revokeApiKey
      tags:
        - API Keys
      security:
        - cookieAuth: []
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID API ключа
      responses:
        '200':
          description: API ключ успешно отозван
        '401':
          description: Пользователь не авторизован.
        '403':
          description: Недостаточно прав для отзыва ключа.
        '404':
          description: API ключ не найден.
        '500':
          description: Внутренняя ошибка сервера.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: Access token передаётся через HTTP-only cookie "access_token".
    refreshCookieAuth:
      type: apiKey
      in: cookie
      name: refresh_token
      description: Refresh token передаётся через HTTP-only cookie "refresh_token". Используется только в эндпоинте /refresh.
  schemas:
    LogTimelineRequest:
      type: object
      properties:
        projectId:
          type: string
          format: uuid
          description: ID проекта.
        level:
          type: array
          items:
            $ref: '#/components/schemas/LogLevel'
          description: Фильтр по уровням лога (можно указать несколько).
        message:
          type: string
          description: Полнотекстовый поиск по сообщению (регистронезависимо). Работает только если ClickHouse хранит поле message.
        from:
          type: string
          format: date-time
          description: Начало временного периода.
        to:
          type: string
          format: date-time
          description: Конец временного периода.
      required:
        - projectId
        - from
        - to
    LogSearchRequest:
      type: object
      properties:
        projectId:
          type: string
          format: uuid
          description: ID проекта.
        level:
          type: array
          items:
            $ref: '#/components/schemas/LogLevel'
          description: Фильтр по уровням лога (можно указать несколько).
        message:
          type: string
          description: Полнотекстовый поиск по сообщению (регистронезависимо).
        from:
          type: string
          format: date-time
          description: Начало временного периода.
        to:
          type: string
          format: date-time
          description: Конец временного периода.
        size:
          type: integer
          default: 50
          description: Количество записей на странице.
        cursor:
          type: string
          format: date-time
          description: Курсор для получения следующей страницы (timestamp последнего лога из предыдущей выборки).
      required:
        - projectId
        - from
        - to
    LogSearchResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: '#/components/schemas/LogEntry'
        nextCursor:
          type: string
          format: date-time
          description: Курсор для получения следующей страницы (timestamp последнего лога из предыдущей выборки). Отсутствует если страниц больше нет.
        totalCount:
          type: integer
          description: Общее количество логов, соответствующих фильтру.
      required:
        - logs
        - totalCount
    LogLevel:
      type: string
      enum: [TRACE, DEBUG, INFO, WARN, ERROR]
    LogEntry:
      type: object
      properties:
        level:
          $ref: '#/components/schemas/LogLevel'
        message:
          type: string
        timestamp:
          type: string
          format: date-time
      required:
        - level
        - message
        - timestamp
    TimelineItem:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          description: Начало интервала.
        totalCount:
          type: integer
          description: Общее количество логов за интервал.
        errorCount:
          type: integer
          description: Количество логов уровня ERROR за интервал.
        warnCount:
          type: integer
          description: Количество логов уровня WARN за интервал.
      required:
        - timestamp
        - totalCount
        - errorCount
        - warnCount
    GetProjectsResponse:
      type: array
      items:
        $ref: '#/components/schemas/GetProjectsResponseItem'
    GetProjectsResponseItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор проекта
        name:
          type: string
          description: Название проекта
        description:
          type: string
          description: Описание проекта
        createdAt:
          type: string
          format: date-time
          description: Дата и время создания проекта
        updatedAt:
          type: string
          format: date-time
          description: Дата и время последнего обновления проекта
        owner:
          type: string
          description: Username владельца проекта
      required:
        - id
        - name
        - createdAt
        - updatedAt
        - owner
    ProjectCreateRequest:
      type: object
      properties:
        name:
          type: string
          description: Название проекта
          minLength: 1
          maxLength: 100
        description:
          type: string
          description: Описание проекта
          maxLength: 1000
      required:
        - name
    ProjectCreateResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор проекта
    UserCredentials:
      type: object
      properties:
        username:
          type: string
          pattern: "^[a-zA-Z0-9_]{4,50}$"
          description: Уникальное имя пользователя, которое должно быть от 4 до 50 символов, только буквы, цифры и подчеркивания.
        password:
          type: string
          pattern: "^(?=.*[A-Za-z])(?=.*\\d)[A-Za-z\\d]{8,}$"
          description: Пароль пользователя, минимум 8 символов, должен включать хотя бы одну букву и одну цифру.
      required:
        - username
        - password
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Не удалось подключиться к базе данных

    ApiKeyCreateRequest:
      type: object
      properties:
        projectId:
          type: string
          format: uuid
          description: ID проекта, для которого создаётся ключ.
        name:
          type: string
          description: Название ключа (например, "production-app", "staging-worker").
          minLength: 1
          maxLength: 100
        expiresAt:
          type: string
          format: date-time
          description: Срок действия ключа (опционально). Если не указан — ключ бессрочный.
      required:
        - projectId
        - name

    ApiKeyCreateResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный ID ключа.
        apiKey:
          type: string
          description: API ключ.
        createdAt:
          type: string
          format: date-time
          description: Дата создания ключа.
      required:
        - id
        - createdAt
        - apiKey

    ApiKeyResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный ID ключа.
        name:
          type: string
          description: Название ключа.
        createdBy:
          type: string
          description: Username создателя ключа.
        expiresAt:
          type: string
          format: date-time
          description: Срок действия ключа - если нету, то бессрочный.
        createdAt:
          type: string
          format: date-time
          description: Дата создания ключа.
      required:
        - id
        - name
        - createdBy
        - createdAt

    # Log Ingestion schemas
    LogIngestRequest:
      type: object
      properties:
        projectId:
          type: string
          format: uuid
          description: ID проекта, к которому относятся логи.
        logs:
          type: array
          description: Массив логов для загрузки (максимум 1000 за запрос).
          items:
            $ref: '#/components/schemas/LogIngestItem'
          maxItems: 1000
      required:
        - projectId
        - logs

    LogIngestItem:
      type: object
      properties:
        level:
          $ref: '#/components/schemas/LogLevel'
        message:
          type: string
          description: Текст лога.
          minLength: 1
          maxLength: 10000
        timestamp:
          type: string
          format: date-time
          description: Время события. Если не указано — используется текущее время сервера.
      required:
        - level
        - message

    LogIngestResponse:
      type: object
      properties:
        ingestionId:
          type: string
          format: uuid
          description: ID пакета логов для отслеживания.
      required:
        - ingestionId

    IngestionStatusResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - pending
            - processing
            - completed
            - failed
          description: Текущий статус обработки.
        accepted:
          type: integer
          description: Количество логов, принятых на обработку.
        processed:
          type: integer
          description: Количество логов, уже записанных в хранилище.
        failed:
          type: integer
          description: Количество логов с ошибками записи.
        startedAt:
          type: string
          format: date-time
          description: Время начала обработки.
        completedAt:
          type: string
          format: date-time
          description: Время завершения обработки (если завершено).
        error:
          type: string
          description: Сообщение об ошибке (если статус failed).
      required:
        - ingestionId
        - status
        - accepted
        - processed
        - failed